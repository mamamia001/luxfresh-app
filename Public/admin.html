<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        const pin = prompt("Enter Admin PIN:");
        if (pin !== "2540") { alert("Unauthorized."); window.location.href = "index.html"; }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxAdmin | Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .card { background: rgba(30,41,59,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-6 pb-40">
    <h1 class="text-2xl font-black italic uppercase mb-8 text-green-500">Lux<span class="text-white">Admin</span></h1>

    <section class="card p-6 rounded-[2.5rem] mb-8">
        <h2 class="text-[9px] font-black uppercase text-green-500 tracking-widest mb-4">Site Controls</h2>
        <textarea id="ann-text" class="w-full bg-slate-900 p-4 rounded-2xl text-xs mb-4 border border-white/5 outline-none" placeholder="Alert Message..."></textarea>
        <div class="grid grid-cols-2 gap-3 mb-4">
            <input id="f-loc" placeholder="Location" class="bg-slate-900 p-3 rounded-xl text-[10px] border border-white/5">
            <input id="f-hours" placeholder="Hours" class="bg-slate-900 p-3 rounded-xl text-[10px] border border-white/5">
            <input id="f-wa" placeholder="WhatsApp (254...)" class="bg-slate-900 p-3 rounded-xl text-[10px] border border-white/5">
            <input id="f-yt" placeholder="YouTube" class="bg-slate-900 p-3 rounded-xl text-[10px] border border-white/5">
        </div>
        <div class="flex justify-between items-center">
            <input type="color" id="theme-color" class="w-10 h-10 bg-transparent border-none">
            <label class="text-[10px] font-black"><input type="checkbox" id="ann-active"> LIVE</label>
            <button onclick="saveSet()" class="bg-green-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase">Broadcast</button>
        </div>
    </section>

    <div class="flex gap-8 mb-6 text-[10px] font-black uppercase opacity-40">
        <button onclick="tab('i')" id="ti" class="border-b-2 border-green-500 opacity-100">Stock</button>
        <button onclick="tab('o')" id="to">Orders</button>
    </div>

    <div id="tab-i" class="space-y-4">
        <div class="card p-6 rounded-[2.5rem]">
            <input id="n-name" placeholder="Item Name" class="w-full bg-slate-900 p-4 rounded-2xl mb-2 text-xs">
            <input id="n-price" type="number" placeholder="Price" class="w-full bg-slate-900 p-4 rounded-2xl mb-2 text-xs">
            <select id="n-cat" class="w-full bg-slate-900 p-4 rounded-2xl mb-4 text-xs text-slate-400">
                <option value="Vegetables">Vegetables</option><option value="Fruits">Fruits</option><option value="Spices">Spices</option>
            </select>
            <input type="file" id="n-file" class="text-[10px] mb-4">
            <button onclick="add()" id="add-btn" class="w-full bg-white text-slate-900 py-4 rounded-2xl font-black uppercase text-[10px]">Add to Inventory</button>
        </div>
        <div id="list" class="space-y-2 pb-20"></div>
        <button onclick="saveInv()" class="fixed bottom-8 left-6 right-6 bg-green-600 py-5 rounded-[2.5rem] font-black uppercase text-xs z-50 shadow-2xl">Save Stock</button>
    </div>

    <div id="tab-o" class="hidden space-y-4"></div>

    <script>
        let inventory = [], lastCount = 0;
        const ding = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        async function load() {
            const resA = await fetch('/api/announcement'); const a = await resA.json();
            document.getElementById('ann-text').value = a.text; document.getElementById('ann-active').checked = a.active;
            document.getElementById('theme-color').value = a.themeColor || '#16a34a';
            document.getElementById('f-loc').value = a.location; document.getElementById('f-hours').value = a.hours;
            document.getElementById('f-wa').value = a.whatsapp; document.getElementById('f-yt').value = a.youtube;
            
            const resI = await fetch('/api/products'); inventory = await resI.json(); renderI();
            refreshOrders();
            setInterval(refreshOrders, 5000); // Check every 5s for new Ngrok orders
        }

        async function refreshOrders() {
            const res = await fetch('/api/orders'); const o = await res.json();
            if(o.length > lastCount) { ding.play(); lastCount = o.length; }
            renderO(o);
        }

        function renderI() {
            document.getElementById('list').innerHTML = inventory.map((p, i) => `
                <div class="card p-3 rounded-2xl flex justify-between items-center">
                    <div class="flex items-center gap-3"><img src="${p.image}" class="w-10 h-10 rounded-lg object-cover">
                    <span class="text-[10px] font-black uppercase">${p.name}</span></div>
                    <button onclick="inventory.splice(${i}, 1); renderI()" class="text-red-500 font-bold px-3">×</button>
                </div>
            `).join('');
        }

        async function add() {
            const n = document.getElementById('n-name').value, p = document.getElementById('n-price').value, c = document.getElementById('n-cat').value, f = document.getElementById('n-file').files[0];
            if(!n || !p || !f) return alert("Fill all");
            const btn = document.getElementById('add-btn'); btn.innerText = "UPLOADING...";
            const fd = new FormData(); fd.append('image', f);
            const res = await fetch('/api/upload', { method: 'POST', body: fd });
            const { imageUrl } = await res.json();
            inventory.push({ name: n, price: parseInt(p), category: c, image: imageUrl });
            renderI(); btn.innerText = "ADD TO INVENTORY";
        }

        async function saveInv() {
            if(prompt("PIN:") === "2540") await fetch('/api/update-inventory', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(inventory) });
            alert("Stock Updated!");
        }

        async function saveSet() {
            const data = {
                text: document.getElementById('ann-text').value, active: document.getElementById('ann-active').checked,
                themeColor: document.getElementById('theme-color').value, location: document.getElementById('f-loc').value,
                hours: document.getElementById('f-hours').value, whatsapp: document.getElementById('f-wa').value,
                youtube: document.getElementById('f-yt').value
            };
            await fetch('/api/update-announcement', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert("Broadcasted!");
        }

        function renderO(orders) {
            document.getElementById('tab-o').innerHTML = orders.slice().reverse().map(o => `
                <div class="card p-5 rounded-[2rem] border-l-4 ${o.status === 'PAID ✅' ? 'border-green-500' : 'border-yellow-500'}">
                    <div class="flex justify-between items-center mb-2">
                        <p class="text-green-500 font-black text-[10px] tracking-widest">${o.phone}</p>
                        <p class="text-[9px] font-black uppercase ${o.status === 'PAID ✅' ? 'text-green-500' : 'text-yellow-500'}">${o.status}</p>
                    </div>
                    <p class="text-xs font-bold my-1 text-white/90">${o.items.join(' + ')}</p>
                    <p class="text-[11px] font-black italic tracking-tighter">KES ${o.amount}</p>
                </div>
            `).join('');
        }

        function tab(t) {
            document.getElementById('tab-i').classList.toggle('hidden', t !== 'i');
            document.getElementById('tab-o').classList.toggle('hidden', t !== 'o');
            document.getElementById('ti').classList.toggle('opacity-100', t === 'i');
            document.getElementById('to').classList.toggle('opacity-100', t === 'o');
        }
        window.onload = load;
    </script>
</body>
</html>
